<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link rel="stylesheet" href="./form.css" />
  </head>
  <body>
    <div class="container">
      <h1>Welcome back</h1>
      <h5>Welcome back! Please enter your details.</h5>
      <form>
        <label for="email">Email</label><br />
        <input type="text" placeholder="Enter your email" required/><br />

        <label for="Password">Password</label><br />
        <input type="password"  placeholder="Password" required/><br />

        <label for="Username">Username</label><br />
        <input type="text" placeholder="Username" required/>
      </form>
      <a href="#">Forgot password</a><br />
      <button type="button" id="submitBtn">Submit</button>
      <p>Don't have an account? <a href="#">Sign up for free</a></p>
    </div>
  </body>
  <script>
    const button = document.getElementById("submitBtn");
    const form = document.getElementsByClassName("container")[0];

    button.addEventListener("click", () => {
      const inputs = form.querySelectorAll("input");

      inputs.forEach((input) => {
        input.style.border = "1px solid blue";
      });

      button.style.backgroundColor = "green";
    });
  </script>
</html>
